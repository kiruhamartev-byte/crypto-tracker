<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Crypto Analyst</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ========== RESET & BASE ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: #0a0a0f;
            color: #e8e8f0;
            min-height: 100vh;
            padding-bottom: 72px;
            -webkit-font-smoothing: antialiased;
        }

        /* ========== ШАПКА ========== */
        .header {
            padding: 18px 20px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0a0a0f;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: #fff;
        }
        .header h1 span {
            color: #7c3aed;
        }
        .header .badge {
            font-size: 10px;
            font-weight: 500;
            background: #14141f;
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid #1e1e30;
            color: #7c3aed;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        /* ========== СТРАНИЦЫ ========== */
        .page {
            display: none;
            padding: 0 16px 20px;
            animation: fade 0.25s ease;
        }
        .page.active {
            display: block;
        }

        @keyframes fade {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ========== ПРИВЕТСТВИЕ ========== */
        .greeting {
            padding: 20px 0 16px;
        }
        .greeting .name {
            font-size: 22px;
            font-weight: 600;
            color: #fff;
            letter-spacing: -0.3px;
        }
        .greeting .sub {
            font-size: 13px;
            color: #666688;
            margin-top: 2px;
        }

        /* ========== ЦЕНЫ ========== */
        .price-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }

        .price-card {
            background: #111118;
            border-radius: 12px;
            padding: 14px 16px;
            border: 1px solid #1a1a2a;
            text-align: center;
        }
        .price-card .coin {
            font-size: 11px;
            font-weight: 500;
            color: #666688;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        .price-card .value {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            letter-spacing: -0.2px;
        }
        .price-card .change {
            font-size: 12px;
            font-weight: 500;
        }
        .price-card .change.positive {
            color: #4caf50;
        }
        .price-card .change.negative {
            color: #ef4444;
        }

        /* ========== ГРАФИК ========== */
        .chart-card {
            background: #111118;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid #1a1a2a;
            margin-bottom: 16px;
        }
        .chart-card .label {
            font-size: 11px;
            font-weight: 500;
            color: #666688;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        canvas {
            width: 100% !important;
            height: 160px !important;
        }

        /* ========== КНОПКИ ========== */
        .btn {
            width: 100%;
            padding: 10px;
            background: #1a1a2a;
            border: none;
            border-radius: 10px;
            color: #8888aa;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 0.3px;
        }
        .btn:hover {
            background: #24243a;
            color: #fff;
        }
        .btn-primary {
            background: #7c3aed;
            color: #fff;
        }
        .btn-primary:hover {
            background: #6d28d9;
        }

        /* ========== ПРОФИЛЬ ========== */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 14px;
            background: #111118;
            border-radius: 12px;
            padding: 16px 18px;
            border: 1px solid #1a1a2a;
            margin-bottom: 16px;
        }
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            overflow: hidden;
            flex-shrink: 0;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .profile-info h2 {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
        }
        .profile-info .level {
            font-size: 12px;
            color: #7c3aed;
            font-weight: 500;
        }
        .profile-info .level-badge {
            display: inline-block;
            background: #14141f;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 10px;
            border: 1px solid #1e1e30;
            color: #8888aa;
            margin-top: 2px;
        }

        /* ========== СТАТИСТИКА ========== */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }
        .stat-card {
            background: #111118;
            border-radius: 12px;
            padding: 12px 14px;
            border: 1px solid #1a1a2a;
            text-align: center;
        }
        .stat-card .num {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            letter-spacing: -0.2px;
        }
        .stat-card .label {
            font-size: 10px;
            font-weight: 500;
            color: #666688;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        /* ========== ПРОГРЕСС XP ========== */
        .progress-section {
            background: #111118;
            border-radius: 12px;
            padding: 14px 16px;
            border: 1px solid #1a1a2a;
        }
        .progress-section .title {
            font-size: 11px;
            font-weight: 500;
            color: #666688;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #1a1a2a;
            border-radius: 4px;
            overflow: hidden;
            margin: 6px 0 6px;
        }
        .progress-bar .fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #7c3aed, #4f46e5);
            border-radius: 4px;
            transition: width 0.4s ease;
        }
        .progress-labels {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: #555577;
        }
        .progress-labels span:first-child {
            color: #8888aa;
        }

        /* ========== ПУСТОЕ СОСТОЯНИЕ ========== */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #555577;
        }
        .empty-state .icon {
            font-size: 36px;
            margin-bottom: 10px;
            opacity: 0.5;
        }
        .empty-state h3 {
            color: #8888aa;
            font-weight: 400;
            font-size: 15px;
        }
        .empty-state p {
            font-size: 12px;
            margin-top: 4px;
        }

        /* ========== НАВИГАЦИЯ ========== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0a0a0f;
            border-top: 1px solid #14141f;
            display: flex;
            justify-content: space-around;
            padding: 6px 0 10px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            z-index: 20;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: none;
            border: none;
            color: #444466;
            font-size: 9px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            padding: 4px 12px;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            position: relative;
        }
        .nav-item .icon {
            font-size: 20px;
            margin-bottom: 1px;
        }
        .nav-item.active {
            color: #7c3aed;
        }
        .nav-item.active::after {
            content: '';
            position: absolute;
            top: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 2px;
            background: #7c3aed;
            border-radius: 4px;
        }

        /* ========== АДАПТИВ ========== */
        @media (max-width: 400px) {
            .price-card .value {
                font-size: 17px;
            }
            .stats-grid {
                gap: 8px;
            }
            .stat-card .num {
                font-size: 16px;
            }
            .profile-header {
                padding: 14px 16px;
            }
        }
    </style>
</head>
<body>

    <!-- ========== ШАПКА ========== -->
    <div class="header">
        <h1>Crypto<span>Analyst</span></h1>
        <span class="badge" id="userLevelBadge">Новичок</span>
    </div>

    <!-- ========== СТРАНИЦА 1: ГЛАВНАЯ ========== -->
    <div class="page active" id="pageHome">
        <div class="greeting">
            <div class="name" id="welcomeGreeting">Привет</div>
            <div class="sub">Актуальные котировки</div>
        </div>

        <div class="price-grid">
            <div class="price-card" id="btcCard">
                <div class="coin">Bitcoin</div>
                <div class="value" id="btcPrice">—</div>
                <div class="change" id="btcChange">—</div>
            </div>
            <div class="price-card" id="ethCard">
                <div class="coin">Ethereum</div>
                <div class="value" id="ethPrice">—</div>
                <div class="change" id="ethChange">—</div>
            </div>
        </div>

        <div class="chart-card">
            <div class="label">BTC / USD — 7 дней</div>
            <canvas id="priceChart"></canvas>
            <button class="btn" onclick="fetchData()" style="margin-top:10px;">Обновить</button>
        </div>
    </div>

    <!-- ========== СТРАНИЦА 2: ПРОФИЛЬ ========== -->
    <div class="page" id="pageProfile">
        <div class="profile-header">
            <div class="avatar" id="userAvatar">👤</div>
            <div class="profile-info">
                <h2 id="userName">Загрузка</h2>
                <div class="level" id="userLevelDisplay">Уровень: Новичок</div>
                <span class="level-badge" id="userLevelBadge2">⚡ 0 XP</span>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="num" id="statTrades">0</div>
                <div class="label">Сделок</div>
            </div>
            <div class="stat-card">
                <div class="num" id="statVolume">0$</div>
                <div class="label">Объём</div>
            </div>
            <div class="stat-card">
                <div class="num" id="statProfit">+0%</div>
                <div class="label">Прибыль</div>
            </div>
            <div class="stat-card">
                <div class="num" id="statRank">#1</div>
                <div class="label">Рейтинг</div>
            </div>
        </div>

        <div class="progress-section">
            <div class="title">Прогресс до следующего уровня</div>
            <div class="progress-bar">
                <div class="fill" id="xpFill" style="width:0%;"></div>
            </div>
            <div class="progress-labels">
                <span id="xpCurrent">0 XP</span>
                <span id="xpNext">1000 XP</span>
            </div>
        </div>

        <button class="btn btn-primary" onclick="simulateTrade()" style="margin-top:14px;">
            Симулировать сделку +50 XP
        </button>
    </div>

    <!-- ========== СТРАНИЦА 3: ПОРТФЕЛЬ ========== -->
    <div class="page" id="pagePortfolio">
        <div class="empty-state">
            <div class="icon">📂</div>
            <h3>Портфель пуст</h3>
            <p>Совершите первую сделку</p>
        </div>
    </div>

    <!-- ========== НИЖНЯЯ НАВИГАЦИЯ ========== -->
    <div class="bottom-nav">
        <button class="nav-item active" data-page="pageHome">
            <span class="icon">📊</span>
            <span>Главная</span>
        </button>
        <button class="nav-item" data-page="pageProfile">
            <span class="icon">👤</span>
            <span>Профиль</span>
        </button>
        <button class="nav-item" data-page="pagePortfolio">
            <span class="icon">💼</span>
            <span>Портфель</span>
        </button>
    </div>

    <script>
        // ============================================================
        // 0. ПОЛУЧАЕМ ДАННЫЕ ПОЛЬЗОВАТЕЛЯ ИЗ TELEGRAM
        // ============================================================
        let tgUser = null;

        function initTelegramUser() {
            try {
                if (window.Telegram && window.Telegram.WebApp) {
                    const data = window.Telegram.WebApp.initDataUnsafe;
                    if (data && data.user) {
                        tgUser = data.user;
                        return tgUser;
                    }
                }
                tgUser = { id: 123456, first_name: 'Гость', last_name: '', username: 'guest' };
                return tgUser;
            } catch (e) {
                tgUser = { id: 123456, first_name: 'Гость', username: 'guest' };
                return tgUser;
            }
        }

        // ============================================================
        // 1. УРОВНИ
        // ============================================================
        const LEVELS = [
            { name: 'Новичок', xpNeeded: 0 },
            { name: 'Трейдер', xpNeeded: 1000 },
            { name: 'Про', xpNeeded: 5000 },
            { name: 'Ультра', xpNeeded: 20000 },
        ];

        // ============================================================
        // 2. ДАННЫЕ ПОЛЬЗОВАТЕЛЯ (localStorage по ID)
        // ============================================================
        let userData = { xp: 0, trades: 0, volume: 0, profit: 0 };

        function getStorageKey() {
            return 'cryptoAnalyst_' + (tgUser ? tgUser.id : 'guest');
        }

        function loadUserData() {
            const saved = localStorage.getItem(getStorageKey());
            if (saved) {
                try { userData = { ...userData, ...JSON.parse(saved) }; } catch (e) {}
            }
        }

        function saveUserData() {
            localStorage.setItem(getStorageKey(), JSON.stringify(userData));
        }

        function getLevel(xp) {
            let result = LEVELS[0];
            for (const lv of LEVELS) {
                if (xp >= lv.xpNeeded) result = lv;
            }
            return result;
        }

        function getNextLevel(xp) {
            for (let i = 0; i < LEVELS.length - 1; i++) {
                if (xp < LEVELS[i + 1].xpNeeded) return LEVELS[i + 1];
            }
            return null;
        }

        function getXpProgress(xp) {
            const current = getLevel(xp);
            const next = getNextLevel(xp);
            if (!next) return 100;
            const earned = xp - current.xpNeeded;
            const needed = next.xpNeeded - current.xpNeeded;
            return Math.min((earned / needed) * 100, 100);
        }

        // ============================================================
        // 3. ОБНОВЛЕНИЕ UI
        // ============================================================
        function updateProfile() {
            const level = getLevel(userData.xp);
            const next = getNextLevel(userData.xp);
            const firstName = tgUser ? tgUser.first_name : 'Гость';

            document.getElementById('userName').textContent = firstName;
            document.getElementById('welcomeGreeting').textContent = `Привет, ${firstName}`;

            const avatar = document.getElementById('userAvatar');
            if (tgUser && tgUser.photo_url) {
                avatar.innerHTML = `<img src="${tgUser.photo_url}" alt="" />`;
            } else {
                avatar.textContent = firstName.charAt(0).toUpperCase();
            }

            document.getElementById('userLevelDisplay').textContent = `Уровень: ${level.name}`;
            document.getElementById('userLevelBadge').textContent = level.name;
            document.getElementById('userLevelBadge2').textContent = `⚡ ${userData.xp} XP`;

            document.getElementById('statTrades').textContent = userData.trades;
            document.getElementById('statVolume').textContent = `$${userData.volume.toLocaleString()}`;
            const sign = userData.profit > 0 ? '+' : '';
            document.getElementById('statProfit').textContent = `${sign}${userData.profit}%`;

            const progress = getXpProgress(userData.xp);
            document.getElementById('xpFill').style.width = progress + '%';
            document.getElementById('xpCurrent').textContent = `${userData.xp} XP`;
            document.getElementById('xpNext').textContent = next ? `${next.xpNeeded} XP` : 'MAX';

            saveUserData();
        }

        // ============================================================
        // 4. СИМУЛЯЦИЯ
        // ============================================================
        function simulateTrade() {
            const xpGain = 50 + Math.floor(Math.random() * 30);
            const volumeGain = Math.floor(Math.random() * 2000) + 500;
            const profitChange = (Math.random() * 10 - 3).toFixed(1);

            userData.xp += xpGain;
            userData.trades += 1;
            userData.volume += volumeGain;
            userData.profit = Math.min(Math.max(userData.profit + parseFloat(profitChange), -20), 50);

            updateProfile();
            const btn = document.querySelector('.btn-primary');
            const orig = btn.textContent;
            btn.textContent = `+${xpGain} XP`;
            btn.style.background = '#2a2a4a';
            setTimeout(() => {
                btn.textContent = orig;
                btn.style.background = '#7c3aed';
            }, 1000);
        }

        // ============================================================
        // 5. КРИПТО API
        // ============================================================
        let chartInstance = null;

        async function fetchData() {
            document.getElementById('btcPrice').textContent = '...';
            document.getElementById('ethPrice').textContent = '...';
            document.getElementById('btcChange').textContent = '...';
            document.getElementById('ethChange').textContent = '...';

            try {
                const priceRes = await fetch(
                    'https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd&include_24hr_change=true'
                );
                const priceData = await priceRes.json();

                const btc = priceData.bitcoin;
                document.getElementById('btcPrice').textContent = '$' + btc.usd.toLocaleString();
                const btcChange = btc.usd_24h_change;
                const btcChangeEl = document.getElementById('btcChange');
                btcChangeEl.textContent = (btcChange > 0 ? '+' : '') + btcChange.toFixed(2) + '%';
                btcChangeEl.className = 'change ' + (btcChange >= 0 ? 'positive' : 'negative');

                const eth = priceData.ethereum;
                document.getElementById('ethPrice').textContent = '$' + eth.usd.toLocaleString();
                const ethChange = eth.usd_24h_change;
                const ethChangeEl = document.getElementById('ethChange');
                ethChangeEl.textContent = (ethChange > 0 ? '+' : '') + ethChange.toFixed(2) + '%';
                ethChangeEl.className = 'change ' + (ethChange >= 0 ? 'positive' : 'negative');

                const histRes = await fetch(
                    'https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=7&interval=daily'
                );
                const histData = await histRes.json();

                const prices = histData.prices.map(p => p[1]);
                const dates = histData.prices.map(p => {
                    const d = new Date(p[0]);
                    return d.getDate() + '/' + (d.getMonth() + 1);
                });

                renderChart(dates, prices);

            } catch (error) {
                document.getElementById('btcPrice').textContent = '⚠️ Error';
                document.getElementById('ethPrice').textContent = '⚠️ Error';
            }
        }

        function renderChart(labels, data) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'BTC',
                        data: data,
                        borderColor: '#7c3aed',
                        backgroundColor: 'rgba(124, 58, 237, 0.06)',
                        fill: true,
                        tension: 0.3,
                        pointRadius: 2,
                        pointBackgroundColor: '#7c3aed',
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: { color: '#666688', font: { size: 9 } }
                        }
                    },
                    scales: {
                        x: {
                            ticks: { color: '#444466', font: { size: 8 } },
                            grid: { color: 'rgba(255,255,255,0.02)' }
                        },
                        y: {
                            ticks: { color: '#444466', font: { size: 8 } },
                            grid: { color: 'rgba(255,255,255,0.02)' }
                        }
                    }
                }
            });
        }

        // ============================================================
        // 6. НАВИГАЦИЯ
        // ============================================================
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById(this.dataset.page).classList.add('active');
            });
        });

        // ============================================================
        // 7. ЗАПУСК
        // ============================================================
        initTelegramUser();
        loadUserData();
        updateProfile();
        fetchData();
        setInterval(fetchData, 5 * 60 * 1000);

        // Затемняем фон приложения в Telegram (опционально)
        if (window.Telegram && Telegram.WebApp) {
            Telegram.WebApp.setBackgroundColor('#0a0a0f');
        }
    </script>

</body>
</html>
