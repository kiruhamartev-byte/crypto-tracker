<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Крипто-трекер</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0f0f1a;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            max-width: 420px;
            width: 100%;
        }

        /* Заголовок с целью */
        .goal-card {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #2a2a4a;
        }

        .goal-card h2 {
            font-size: 14px;
            color: #8888aa;
            font-weight: 400;
            margin-bottom: 6px;
        }

        .goal-card .city {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #2a2a4a;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-bar .fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f7931a, #ff6b6b);
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .goal-stats {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #8888aa;
        }

        .goal-stats span {
            color: #fff;
            font-weight: 600;
        }

        /* Карточки с ценами */
        .price-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .price-card {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid #2a2a4a;
            text-align: center;
        }

        .price-card .coin {
            font-size: 13px;
            color: #8888aa;
            font-weight: 500;
        }

        .price-card .value {
            font-size: 24px;
            font-weight: 700;
            margin: 4px 0;
        }

        .price-card .change {
            font-size: 13px;
            font-weight: 500;
        }

        .price-card .change.positive {
            color: #4caf50;
        }

        .price-card .change.negative {
            color: #ff5252;
        }

        /* График */
        .chart-card {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #2a2a4a;
        }

        .chart-card h3 {
            font-size: 14px;
            color: #8888aa;
            font-weight: 400;
            margin-bottom: 12px;
        }

        canvas {
            width: 100% !important;
            height: 200px !important;
        }

        /* Статус загрузки */
        .loading {
            text-align: center;
            color: #8888aa;
            padding: 30px 0;
            font-size: 14px;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #2a2a4a;
            border-top-color: #f7931a;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Кнопка обновить */
        .refresh-btn {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            background: #2a2a4a;
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .refresh-btn:hover {
            background: #3a3a5a;
        }
    </style>
</head>
<body>

    <div class="container" id="app">

        <!-- Цель: переезд -->
        <div class="goal-card">
            <h2>🎯 Цель — переезд в</h2>
            <div class="city" id="goalCity">Москву</div>
            <div class="progress-bar">
                <div class="fill" id="progressFill" style="width: 0%;"></div>
            </div>
            <div class="goal-stats">
                <span>Накоплено: <span id="savedAmount">0</span> ₽</span>
                <span>Нужно: <span id="targetAmount">100 000</span> ₽</span>
            </div>
        </div>

        <!-- Цены -->
        <div class="price-grid">
            <div class="price-card" id="btcCard">
                <div class="coin">₿ Bitcoin</div>
                <div class="value" id="btcPrice">—</div>
                <div class="change" id="btcChange">—</div>
            </div>
            <div class="price-card" id="ethCard">
                <div class="coin">⟠ Ethereum</div>
                <div class="value" id="ethPrice">—</div>
                <div class="change" id="ethChange">—</div>
            </div>
        </div>

        <!-- График -->
        <div class="chart-card">
            <h3>📈 Изменение цены BTC за 7 дней</h3>
            <canvas id="priceChart"></canvas>
            <button class="refresh-btn" onclick="fetchData()">🔄 Обновить</button>
        </div>

        <div style="text-align: center; margin-top: 16px; font-size: 12px; color: #444466;">
            Данные с CoinGecko • @nocateee12_bot
        </div>
    </div>

    <script>
        // ============================================================
        // 1. НАСТРОЙКИ (меняй под себя)
        // ============================================================
        const GOAL_CITY = 'Москву'; // Город для переезда
        const TARGET_AMOUNT = 100000; // Целевая сумма в рублях
        const SAVED_AMOUNT = 15000; // Сколько уже накопил (можешь менять)

        // ============================================================
        // 2. ПОЛУЧЕНИЕ ДАННЫХ С API
        // ============================================================
        let chartInstance = null;

        async function fetchData() {
            // Показываем загрузку
            document.getElementById('btcPrice').textContent = '...';
            document.getElementById('ethPrice').textContent = '...';
            document.getElementById('btcChange').textContent = '...';
            document.getElementById('ethChange').textContent = '...';

            try {
                // Получаем текущие цены
                const priceRes = await fetch(
                    'https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd&include_24hr_change=true'
                );
                const priceData = await priceRes.json();

                // Обновляем BTC
                const btc = priceData.bitcoin;
                document.getElementById('btcPrice').textContent = '$' + btc.usd.toLocaleString();
                const btcChange = btc.usd_24h_change;
                const btcChangeEl = document.getElementById('btcChange');
                btcChangeEl.textContent = (btcChange > 0 ? '+' : '') + btcChange.toFixed(2) + '%';
                btcChangeEl.className = 'change ' + (btcChange >= 0 ? 'positive' : 'negative');

                // Обновляем ETH
                const eth = priceData.ethereum;
                document.getElementById('ethPrice').textContent = '$' + eth.usd.toLocaleString();
                const ethChange = eth.usd_24h_change;
                const ethChangeEl = document.getElementById('ethChange');
                ethChangeEl.textContent = (ethChange > 0 ? '+' : '') + ethChange.toFixed(2) + '%';
                ethChangeEl.className = 'change ' + (ethChange >= 0 ? 'positive' : 'negative');

                // Получаем историю для графика (7 дней)
                const histRes = await fetch(
                    'https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=7&interval=daily'
                );
                const histData = await histRes.json();

                // Достаём цены и даты
                const prices = histData.prices.map(p => p[1]); // массив цен
                const dates = histData.prices.map(p => {
                    const d = new Date(p[0]);
                    return d.getDate() + '/' + (d.getMonth() + 1);
                });

                // Рисуем график
                renderChart(dates, prices);

                // Обновляем прогресс цели
                updateGoal();

            } catch (error) {
                console.error('Ошибка:', error);
                document.getElementById('btcPrice').textContent = 'Ошибка';
                document.getElementById('ethPrice').textContent = 'Ошибка';
            }
        }

        // ============================================================
        // 3. ГРАФИК
        // ============================================================
        function renderChart(labels, data) {
            const ctx = document.getElementById('priceChart').getContext('2d');

            if (chartInstance) {
                chartInstance.destroy();
            }

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'BTC (USD)',
                        data: data,
                        borderColor: '#f7931a',
                        backgroundColor: 'rgba(247, 147, 26, 0.1)',
                        fill: true,
                        tension: 0.3,
                        pointRadius: 3,
                        pointBackgroundColor: '#f7931a',
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: {
                                color: '#8888aa',
                                font: { size: 11 }
                            }
                        }
                    },
                    scales: {
                        x: {
                            ticks: { color: '#666688', font: { size: 10 } },
                            grid: { color: 'rgba(255,255,255,0.05)' }
                        },
                        y: {
                            ticks: { color: '#666688', font: { size: 10 } },
                            grid: { color: 'rgba(255,255,255,0.05)' }
                        }
                    }
                }
            });
        }

        // ============================================================
        // 4. ПРОГРЕСС ЦЕЛИ
        // ============================================================
        function updateGoal() {
            document.getElementById('goalCity').textContent = GOAL_CITY;
            document.getElementById('savedAmount').textContent = SAVED_AMOUNT.toLocaleString();
            document.getElementById('targetAmount').textContent = TARGET_AMOUNT.toLocaleString();

            const percent = Math.min((SAVED_AMOUNT / TARGET_AMOUNT) * 100, 100);
            document.getElementById('progressFill').style.width = percent + '%';
        }

        // ============================================================
        // 5. ЗАПУСК
        // ============================================================
        // Сразу показываем цель
        updateGoal();
        // Загружаем данные
        fetchData();

        // Автообновление раз в 5 минут
        setInterval(fetchData, 5 * 60 * 1000);
    </script>

</body>
</html>
